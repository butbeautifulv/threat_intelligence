
# Example configuration for vuln
# Adjust values or use environment-based loader in production.
env: local

mongoConfig:
	# Optional full URI (if provided, other auth fields are ignored)
	uri: ""

	# Host/port used when `uri` is empty
	host: localhost
	port: 27017

	# Optional credentials; leave empty for no-auth local Mongo
	username: ""
	password: ""

	# Database name
	database: vuln

	# Optional auth source (only used when username/password are provided)
	auth_source: ""

	# Connection pool sizing (optional)
	max_pool_size: 100
	min_pool_size: 1

	# Connect timeout in milliseconds
	connect_timeout: 5000


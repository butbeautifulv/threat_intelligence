# Optional: test / air-gapped import from a local graph pack ZIP (no GitHub download).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.testpack.yml up --build -d
# Adjust the host path if your pack lives elsewhere.
services:
  graph-bootstrap:
    volumes:
      - ./data/neo4j_user_export/releases/threat-intel-graph-v0.3.0.zip:/pack/host.zip:ro
    environment:
      - GRAPH_PACK_DEFAULT=0

# R1: tools enabled when binary exists on PATH (smoke / dev).
tools:
  - name: nmap_scan
    category: network
    binary: nmap
    parameters:
      - name: target
        type: string
        required: true
      - name: scan_type
        type: string
        default: "-sV"
        required: false
      - name: ports
        type: string
        required: false
      - name: additional_args
        type: string
        default: "-T4 -Pn"
        required: false
    args:
      - "{scan_type}"
      - "-p"
      - "{ports}"
      - "{additional_args}"
      - "{target}"
    timeout_sec: 600
    description: "network tool: nmap scan"
    enabled: true
  - name: nuclei_scan
    category: web
    binary: nuclei
    parameters:
      - name: target
        type: string
        required: true
      - name: templates
        type: string
        required: false
      - name: additional_args
        type: string
        required: false
    args:
      - "-u"
      - "{target}"
      - "-t"
      - "{templates}"
      - "{additional_args}"
    timeout_sec: 600
    description: Nuclei vulnerability scan
    enabled: true
  - name: httpx_probe
    category: web
    binary: httpx
    parameters:
      - name: target
        type: string
        required: true
      - name: additional_args
        type: string
        default: "-silent"
        required: false
    args:
      - "-u"
      - "{target}"
      - "{additional_args}"
    timeout_sec: 120
    description: HTTP probing
    enabled: true
  - name: subfinder_scan
    category: osint
    binary: subfinder
    parameters:
      - name: target
        type: string
        required: true
      - name: additional_args
        type: string
        required: false
    args:
      - "-d"
      - "{target}"
      - "{additional_args}"
    timeout_sec: 300
    description: Subdomain discovery
    enabled: true
  - name: trivy_scan
    category: cloud
    binary: trivy
    parameters:
      - name: target
        type: string
        required: true
      - name: additional_args
        type: string
        required: false
    args:
      - "image"
      - "{target}"
      - "{additional_args}"
    timeout_sec: 600
    description: Trivy container/image scan
    enabled: true
  - name: ffuf_scan
    category: web
    binary: ffuf
    parameters:
      - name: target
        type: string
        required: true
      - name: url
        type: string
        required: true
      - name: wordlist
        type: string
        default: "/usr/share/wordlists/dirb/common.txt"
        required: false
    args:
      - "-u"
      - "{url}"
      - "-w"
      - "{wordlist}"
    timeout_sec: 600
    description: "web tool: ffuf scan"
    enabled: true
  - name: arjun_scan
    category: web
    binary: arjun
    parameters:
      - name: target
        type: string
        required: true
      - name: url
        type: string
        required: true
    args:
      - "-u"
      - "{url}"
    timeout_sec: 300
    description: "web tool: arjun scan"
    enabled: true
  - name: api_fuzzer
    category: web
    binary: api
    parameters:
      - name: target
        type: string
        required: true
      - name: base_url
        type: string
        required: true
    args:
      - "{base_url}"
    timeout_sec: 300
    description: "web tool: api fuzzer"
    enabled: true
  - name: graphql_scanner
    category: web
    binary: graphql
    parameters:
      - name: target
        type: string
        required: true
      - name: endpoint
        type: string
        required: true
    args:
      - "{endpoint}"
    timeout_sec: 300
    description: "web tool: graphql scanner"
    enabled: true
  - name: jwt_analyzer
    category: intelligence
    binary: jwt
    parameters:
      - name: target
        type: string
        required: true
      - name: jwt_token
        type: string
        required: true
    args:
      - "{jwt_token}"
    timeout_sec: 120
    description: "intelligence tool: jwt analyzer"
    enabled: true
  - name: api_schema_analyzer
    category: intelligence
    binary: api
    parameters:
      - name: target
        type: string
        required: true
      - name: schema_url
        type: string
        required: true
    args:
      - "{schema_url}"
    timeout_sec: 300
    description: "intelligence tool: api schema analyzer"
    enabled: true
  - name: dalfox_xss_scan
    category: web
    binary: dalfox
    parameters:
      - name: target
        type: string
        required: true
      - name: url
        type: string
        required: true
    args:
      - "url"
      - "{url}"
    timeout_sec: 300
    description: "web tool: dalfox xss scan"
    enabled: true
  - name: gobuster_scan
    category: web
    binary: gobuster
    parameters:
      - name: target
        type: string
        required: true
      - name: url
        type: string
        required: true
      - name: mode
        type: string
        default: "dir"
        required: false
      - name: wordlist
        type: string
        default: "/usr/share/wordlists/dirb/common.txt"
        required: false
    args:
      - "{mode}"
      - "-u"
      - "{url}"
      - "-w"
      - "{wordlist}"
    timeout_sec: 600
    description: "web tool: gobuster scan"
    enabled: true
  - name: rustscan_fast_scan
    category: network
    binary: rustscan
    parameters:
      - name: target
        type: string
        required: true
      - name: ports
        type: string
        default: "1-1000"
        required: false
    args:
      - "-a"
      - "{target}"
      - "-r"
      - "{ports}"
    timeout_sec: 300
    description: "network tool: rustscan fast scan"
    enabled: true
  - name: nikto_scan
    category: web
    binary: nikto
    parameters:
      - name: target
        type: string
        required: true
      - name: host
        type: string
        required: true
    args:
      - "-h"
      - "{host}"
    timeout_sec: 600
    description: "web tool: nikto scan"
    enabled: true

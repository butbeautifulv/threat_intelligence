# Production-style overlay: HTTP load balancer in front of API + horizontal scale hints.
#
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml --profile deploy up -d
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml --profile deploy up -d --scale api=3 --scale ingest-worker=2
#
# Public HTTP: LB_HTTP_PORT (default 8888) -> nginx -> api:8090 (internal).
# API remains reachable on API_PORT for direct debugging unless you firewall it.
services:
  nginx-lb:
    profiles: ["deploy"]
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "${LB_HTTP_PORT:-8888}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure

name: engage-secure

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  secure-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secure compose smoke (nginx TLS)
        run: make test-engage-secure

  keycloak-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Keycloak auth path smoke
        run: make test-engage-keycloak

name: platform

on:
  push:
    branches: [main, master]
    paths:
      - 'pkg/harvest/**'
      - 'pkg/commit/**'
      - 'pkg/natsjet/**'
      - 'pkg/engage/**'
      - 'pipeline/connector/**'
      - 'pipeline/ned/**'
      - 'pipeline/engage-events/**'
      - 'graph/ingest/**'
      - 'graph/connector/**'
      - 'engage/serve/internal/client/veilgraph/**'
      - 'engage/serve/internal/usecase/intelligence/**'
      - 'scripts/test/smoke-platform*.sh'
      - 'docs/platform-closed-loop-pilot.md'
      - 'Makefile'
      - 'versions.env'
      - '.github/workflows/platform.yml'
  pull_request:
    paths:
      - 'pkg/harvest/**'
      - 'pkg/commit/**'
      - 'pkg/natsjet/**'
      - 'pkg/engage/**'
      - 'pipeline/connector/**'
      - 'pipeline/ned/**'
      - 'pipeline/engage-events/**'
      - 'graph/ingest/**'
      - 'graph/connector/**'
      - 'engage/serve/internal/client/veilgraph/**'
      - 'engage/serve/internal/usecase/intelligence/**'
      - 'scripts/test/smoke-platform*.sh'
      - 'docs/platform-closed-loop-pilot.md'
      - 'Makefile'
      - 'versions.env'
      - '.github/workflows/platform.yml'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Platform bus unit tests (P0)
        run: make test-platform-p0

  closed-loop:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Docker version
        run: docker compose version

      - name: Closed-loop pilot smoke (P3)
        env:
          SMOKE_VEIL_STACK_BUILD: '1'
        run: make test-platform-closed-loop

name: platform

on:
  workflow_dispatch:
    inputs:
      run_full_loop:
        description: Run P4b full loop smoke (heavy Docker)
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'pkg/**'
      - 'discovery/**'
      - 'pipeline/**'
      - 'knowledge/**'
      - 'engage/**'
      - 'scripts/test/smoke-platform*.sh'
      - 'scripts/test/smoke-unified-edge.sh'
      - 'deploy/platform/**'
      - 'docs/platform-unified-access.md'
      - 'docs/platform-closed-loop-pilot.md'
      - 'docs/platform-full-loop-smoke.md'
      - 'docs/domain-contour.md'
      - 'deploy/terraform/**'
      - 'Makefile'
      - 'versions.env'
      - '.github/workflows/platform.yml'
  pull_request:
    paths:
      - 'pkg/**'
      - 'discovery/**'
      - 'pipeline/**'
      - 'knowledge/**'
      - 'engage/**'
      - 'scripts/test/smoke-platform*.sh'
      - 'scripts/test/smoke-unified-edge.sh'
      - 'deploy/platform/**'
      - 'docs/platform-unified-access.md'
      - 'docs/platform-closed-loop-pilot.md'
      - 'docs/platform-full-loop-smoke.md'
      - 'docs/domain-contour.md'
      - 'deploy/terraform/**'
      - 'Makefile'
      - 'versions.env'
      - '.github/workflows/platform.yml'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Platform P7 unit tests (pkg domain + layer slices)
        run: make test-platform-p7

  closed-loop:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Docker version
        run: docker compose version

      - name: Closed-loop pilot smoke (P3)
        env:
          SMOKE_VEIL_STACK_BUILD: '1'
        run: make test-platform-closed-loop

  unified-edge:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Docker version
        run: docker compose version

      - name: Unified edge smoke (P12i)
        env:
          SMOKE_UNIFIED_EDGE_BUILD: '1'
          SMOKE_UNIFIED_EDGE_WAIT_SEC: '600'
          VEIL_EDGE_HTTPS_PORT: '8443'
        run: make test-platform-unified-edge

  full-loop:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_loop == true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Docker version
        run: docker compose version

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Platform P7 unit tests
        run: make test-platform-p7

      - name: Full loop smoke (P4b)
        env:
          SMOKE_VEIL_STACK_BUILD: '1'
          SMOKE_SCRAPE_WAIT_SEC: '900'
        run: make test-platform-full-loop

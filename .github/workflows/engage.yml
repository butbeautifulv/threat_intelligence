name: engage

on:
  push:
    branches: [main, master]
    paths:
      - 'engage/**'
      - 'pkg/auth/**'
      - 'pkg/engage/**'
      - 'pipeline/engage-events/**'
      - 'graph/connector/**'
      - 'graph/ingest/**'
      - 'scripts/engage/**'
      - 'scripts/benchmark/**'
      - 'scripts/test/smoke-engage*.sh'
      - 'scripts/test/engage-hardening-selftest.sh'
      - 'scripts/engage/hardening-compose-audit.py'
      - 'docs/engage-hardening.md'
      - 'scripts/test/smoke-veil-engage-stack.sh'
      - 'scripts/test/smoke-veil-engage-stack-ci.sh'
      - 'scripts/test/smoke-platform-closed-loop.sh'
      - 'pkg/natsjet/**'
      - 'deploy/engage/**'
      - 'versions.env'
      - 'Makefile'
      - '.github/workflows/engage.yml'
  pull_request:
    paths:
      - 'engage/**'
      - 'pkg/auth/**'
      - 'pkg/engage/**'
      - 'pipeline/engage-events/**'
      - 'graph/connector/**'
      - 'graph/ingest/**'
      - 'scripts/engage/**'
      - 'scripts/benchmark/**'
      - 'scripts/test/smoke-engage*.sh'
      - 'scripts/test/engage-hardening-selftest.sh'
      - 'scripts/engage/hardening-compose-audit.py'
      - 'docs/engage-hardening.md'
      - 'scripts/test/smoke-veil-engage-stack.sh'
      - 'scripts/test/smoke-veil-engage-stack-ci.sh'
      - 'scripts/test/smoke-platform-closed-loop.sh'
      - 'pkg/natsjet/**'
      - 'deploy/engage/**'
      - 'versions.env'
      - 'Makefile'
      - '.github/workflows/engage.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Graph pack version bump check
        run: make check-graph-version

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Unit tests and build
        run: make test-engage

      - name: Hardening self-test (in-process + static audit)
        run: |
          cd engage/serve && go test ./internal/security/... -count=1
          python3 scripts/engage/hardening-compose-audit.py
          python3 scripts/engage/hardening-framework-audit.py

      - name: HexStrike parity benchmark JSON
        run: |
          chmod +x ./scripts/benchmark/engage-hexstrike-parity.sh
          ENGAGE_BENCHMARK_EXECUTE=0 ./scripts/benchmark/engage-hexstrike-parity.sh

      - name: Upload benchmark JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: engage-hexstrike-benchmark
          path: scripts/benchmark/results/latest.json
          if-no-files-found: warn

      - name: Catalog parity
        run: make test-engage-parity

      - name: Catalog args gate
        run: make test-engage-catalog-args

      - name: Legacy HTTP route parity
        run: make test-engage-route-parity

      - name: N/A execution matrix (158 tools, 100+ live)
        run: make test-engage-na-matrix

      - name: MCP runner triangle CSV
        run: python3 ./scripts/engage/audit-mcp-runner-triangle.py

      - name: Upload triangle artifact
        uses: actions/upload-artifact@v4
        with:
          name: engage-mcp-runner-triangle
          path: docs/engage-mcp-runner-triangle.csv
          if-no-files-found: error

      - name: Enable tools on PATH
        run: ./scripts/engage/enable-tools-on-path.sh network web

      - name: MCP smoke (tools/list)
        run: |
          chmod +x ./scripts/test/smoke-engage-mcp.sh
          ./scripts/test/smoke-engage-mcp.sh

      - name: Metrics smoke
        run: make test-engage-metrics

      - name: Smoke tool matrix (10 tools, best-effort)
        run: |
          chmod +x ./scripts/test/smoke-engage-tool-matrix.sh
          ./scripts/test/smoke-engage-tool-matrix.sh

  engage-compose:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Compose e2e (async jobs + runner profile smoke)
        run: make test-engage-compose

  engage-events-e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Docker version
        run: docker compose version
      - name: Engage events pipeline smoke
        run: make test-engage-events-pipeline

  engage-queue-e2e:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Redis 2-worker queue e2e
        run: make test-engage-redis-workers

  engage-veil-stack:
    runs-on: ubuntu-latest
    needs: engage-events-e2e
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Veil stack + engage e2e (read path)
        run: make test-engage-veil-stack-ci

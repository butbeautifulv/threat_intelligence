global:
  imageTag: ""

graph:
  api:
    replicas: 3
  ingress:
    enabled: true
    host: api.veil.example

engage:
  api:
    replicas: 2
  runner:
    enabled: false

pipeline:
  worker:
    replicas: 3
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 20

ingest:
  worker:
    replicas: 3
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 20

scrape:
  cronJob:
    schedule: "0 2 * * *"
    profile: full-enrich

{{- if .Values.engage.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "veil.fullname" . }}-engage-mcp
spec:
  replicas: {{ .Values.engage.mcp.replicas }}
  selector:
    matchLabels:
      app: veil-engage-mcp
  template:
    metadata:
      labels:
        app: veil-engage-mcp
    spec:
      containers:
        - name: engage-mcp
          image: "{{ .Values.global.imageRegistry }}veil-engage-mcp:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8892
          env:
            - name: ENGAGE_MCP_HTTP_ENABLED
              value: "1"
            - name: ENGAGE_MCP_HTTP_LISTEN
              value: ":8892"
          livenessProbe:
            httpGet:
              path: /health
              port: 8892
            initialDelaySeconds: 30
{{- end }}

{{- if .Values.graph.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "veil.fullname" . }}-mcp
spec:
  replicas: {{ .Values.graph.mcp.replicas }}
  selector:
    matchLabels:
      app: veil-mcp
  template:
    metadata:
      labels:
        app: veil-mcp
    spec:
      containers:
        - name: mcp
          image: "{{ .Values.global.imageRegistry }}veil-mcp:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8091
          env:
            - name: NEO4J_URI
              value: {{ .Values.global.neo4jUri | quote }}
            - name: MCP_HTTP_ENABLED
              value: "1"
            - name: MCP_HTTP_LISTEN
              value: ":8091"
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 30
{{- end }}

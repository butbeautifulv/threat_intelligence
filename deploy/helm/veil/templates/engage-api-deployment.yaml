{{- if .Values.engage.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "veil.fullname" . }}-engage-api
spec:
  replicas: {{ .Values.engage.api.replicas }}
  selector:
    matchLabels:
      app: veil-engage-api
  template:
    metadata:
      labels:
        app: veil-engage-api
    spec:
      containers:
        - name: engage-api
          image: "{{ .Values.global.imageRegistry }}veil-engage-api:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8890
          env:
            - name: ENGAGE_VEIL_API_URL
              value: {{ .Values.global.veilApiUrl | quote }}
            - name: ENGAGE_NATS_URL
              value: {{ .Values.global.natsUrl | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8890
            initialDelaySeconds: 30
{{- end }}

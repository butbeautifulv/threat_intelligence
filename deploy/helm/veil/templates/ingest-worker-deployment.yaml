apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "veil.fullname" . }}-ingest-worker
spec:
  replicas: {{ .Values.ingest.worker.replicas }}
  selector:
    matchLabels:
      app: veil-ingest-worker
  template:
    metadata:
      labels:
        app: veil-ingest-worker
    spec:
      containers:
        - name: ingest-worker
          image: "{{ .Values.global.imageRegistry }}veil-ingest-worker:{{ .Values.global.imageTag }}"
          env:
            - name: NATS_URL
              value: {{ .Values.global.natsUrl | quote }}
            - name: NEO4J_URI
              value: {{ .Values.global.neo4jUri | quote }}

{{- if .Values.ingest.worker.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "veil.fullname" . }}-ingest-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "veil.fullname" . }}-ingest-worker
  minReplicas: {{ .Values.ingest.worker.hpa.minReplicas }}
  maxReplicas: {{ .Values.ingest.worker.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
{{- end }}

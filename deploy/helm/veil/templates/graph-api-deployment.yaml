{{- if .Values.graph.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "veil.fullname" . }}-api
spec:
  replicas: {{ .Values.graph.api.replicas }}
  selector:
    matchLabels:
      app: veil-api
  template:
    metadata:
      labels:
        app: veil-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}veil-api:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8090
          env:
            - name: NEO4J_URI
              value: {{ .Values.global.neo4jUri | quote }}
            - name: NATS_URL
              value: {{ .Values.global.natsUrl | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
{{- end }}

# Engage layer (offensive tooling) — opt-in; not part of default full stack.
services:
  engage-api:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/api.Dockerfile
    ports:
      - "${ENGAGE_API_PORT:-8890}:8890"
    environment:
      ENGAGE_API_LISTEN: ":8890"
      ENGAGE_ENV: ${ENGAGE_ENV:-local}
      ENGAGE_CATALOG_PATH: /app/catalog/tools.yaml
      ENGAGE_RUNNER_WORKDIR: /tmp/engage
      ENGAGE_VEIL_API_URL: ${ENGAGE_VEIL_API_URL:-http://api:8090}
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
    volumes:
      - ../../engage/serve/catalog:/app/catalog:ro
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5

  engage-mcp:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/mcp.Dockerfile
    ports:
      - "${ENGAGE_MCP_PORT:-8892}:8892"
    environment:
      ENGAGE_ENV: ${ENGAGE_ENV:-local}
      ENGAGE_CATALOG_PATH: /app/catalog/tools.yaml
      ENGAGE_RUNNER_WORKDIR: /tmp/engage
      ENGAGE_MCP_HTTP_ENABLED: ${ENGAGE_MCP_HTTP_ENABLED:-1}
      ENGAGE_MCP_HTTP_LISTEN: ":8892"
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
    volumes:
      - ../../engage/serve/catalog:/app/catalog:ro
    healthcheck:
      test: ["CMD", "/mcp", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5

  engage-worker:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/worker.Dockerfile
    environment:
      ENGAGE_ENV: ${ENGAGE_ENV:-local}
      ENGAGE_CATALOG_PATH: /app/catalog/tools.yaml
      ENGAGE_RUNNER_WORKDIR: /tmp/engage
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
    volumes:
      - ../../engage/serve/catalog:/app/catalog:ro
    depends_on:
      engage-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/worker", "healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 3

  engage-runner:
    build:
      context: ../..
      dockerfile: deploy/engage/docker/runner.Dockerfile
    network_mode: none
    profiles:
      - runner
    volumes:
      - engage_work:/tmp/engage

volumes:
  engage_work:

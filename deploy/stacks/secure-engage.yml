# Stack preset: production-style engage (nginx TLS, catalog-only commands).
name: secure-engage
description: >
  Engage API and MCP behind nginx HTTPS; prod env flags (deny raw command, docker
  runner, target guard). Opt-in layer — not part of the default full stack.
profiles:
  - deploy/profiles/secure-engage.env
compose:
  - deploy/engage/compose.yml
  - deploy/engage/compose.secure.yml
notes:
  - >-
    Generate dev TLS under deploy/engage/nginx/certs/ or point
    ENGAGE_NGINX_TLS_CERT / ENGAGE_NGINX_TLS_KEY at production certs.
  - Optional Keycloak overlay deploy/engage/compose.keycloak.yml (not in default chain).
  - See docs/deploy-secure.md and docs/engage-runtime.md.
scripts:
  - scripts/test/smoke-engage-secure.sh

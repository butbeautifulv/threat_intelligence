# Stack preset: production-style graph read path (nginx TLS, auth).
name: secure-graph
description: >
  Graph API and Neo4j behind nginx on host :443 only; MCP via compose profile
  mcp. Requires Keycloak or injected secrets for real production (see profile
  comments).
profiles:
  - deploy/profiles/secure-graph.env
compose:
  - deploy/knowledge/compose.yml
  - deploy/knowledge/compose.secure.yml
compose_profiles:
  - mcp
notes:
  - >-
    Do not use deploy/knowledge/compose.neo4j-publish.yml with this stack; secure
    overlay keeps Neo4j off the host.
  - See docs/deploy-secure.md for TLS certs and Keycloak wiring.
scripts:
  - scripts/test/smoke-graph-read.sh

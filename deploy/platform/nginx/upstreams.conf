# Unified edge upstreams (P12b). Internal Docker network only.
upstream veil_api {
    server api:8090;
    keepalive 8;
}

upstream veil_mcp {
    server mcp:8091;
    keepalive 4;
}

upstream engage_api {
    server engage-api:8890;
    keepalive 4;
}

upstream engage_mcp {
    server engage-mcp:8892;
    keepalive 4;
}

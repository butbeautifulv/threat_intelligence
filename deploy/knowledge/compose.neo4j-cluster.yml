# Neo4j Enterprise 3-primary cluster overlay (requires NEO4J_ACCEPT_LICENSE_AGREEMENT=yes).
# Usage:
#   docker compose -f deploy/knowledge/compose.yml \
#     -f deploy/knowledge/compose.neo4j-cluster.yml up -d
# See docs/deploy/neo4j-cluster.md.

x-neo4j-cluster-env: &neo4j_cluster_env
  NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
  NEO4J_AUTH: neo4j/neo4jpassword
  NEO4J_PLUGINS: '["apoc"]'
  NEO4J_dbms_security_procedures_unrestricted: apoc.*
  NEO4J_apoc_export_file_enabled: "true"
  NEO4J_initial_server_mode__constraint: PRIMARY
  NEO4J_initial_dbms_default__primaries__count: "3"
  NEO4J_initial_dbms_default__secondaries__count: "0"
  NEO4J_dbms_cluster_discovery_version: V2_ONLY
  NEO4J_dbms_cluster_discovery_v2_endpoints: neo4j-core1:6000,neo4j-core2:6000,neo4j-core3:6000
  NEO4J_dbms_routing_enabled: "true"
  NEO4J_dbms_routing_default_router: SERVER

x-neo4j-cluster-health: &neo4j_cluster_health
  test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' >/dev/null 2>&1"]
  interval: 10s
  timeout: 10s
  retries: 60
  start_period: 120s

x-neo4j-cluster-routing-uri: &neo4j_routing_uri
  NEO4J_CLUSTER: "1"
  NEO4J_URI: neo4j+routing://neo4j-core1:7687

services:
  neo4j:
    profiles:
      - neo4j-single

  neo4j-core1:
    image: neo4j:5-enterprise
    hostname: neo4j-core1
    environment:
      <<: *neo4j_cluster_env
      NEO4J_server_bolt_advertised__address: neo4j-core1:7687
      NEO4J_server_http_advertised__address: neo4j-core1:7474
      NEO4J_server_cluster_advertised__address: neo4j-core1:6000
      NEO4J_server_cluster_raft_advertised__address: neo4j-core1:7000
    volumes:
      - neo4j_core1_data:/data
      - ../../var/veil/graph:/var/lib/neo4j/import/user_export
    healthcheck: *neo4j_cluster_health

  neo4j-core2:
    image: neo4j:5-enterprise
    hostname: neo4j-core2
    environment:
      <<: *neo4j_cluster_env
      NEO4J_server_bolt_advertised__address: neo4j-core2:7687
      NEO4J_server_http_advertised__address: neo4j-core2:7474
      NEO4J_server_cluster_advertised__address: neo4j-core2:6000
      NEO4J_server_cluster_raft_advertised__address: neo4j-core2:7000
    volumes:
      - neo4j_core2_data:/data
    healthcheck: *neo4j_cluster_health

  neo4j-core3:
    image: neo4j:5-enterprise
    hostname: neo4j-core3
    environment:
      <<: *neo4j_cluster_env
      NEO4J_server_bolt_advertised__address: neo4j-core3:7687
      NEO4J_server_http_advertised__address: neo4j-core3:7474
      NEO4J_server_cluster_advertised__address: neo4j-core3:6000
      NEO4J_server_cluster_raft_advertised__address: neo4j-core3:7000
    volumes:
      - neo4j_core3_data:/data
    healthcheck: *neo4j_cluster_health

  graph-bootstrap:
    depends_on: !reset
      neo4j-core1:
        condition: service_healthy
      neo4j-core2:
        condition: service_healthy
      neo4j-core3:
        condition: service_healthy
    environment:
      <<: *neo4j_routing_uri

  ingest_worker:
    depends_on: !reset
      neo4j-core1:
        condition: service_healthy
      neo4j-core2:
        condition: service_healthy
      neo4j-core3:
        condition: service_healthy
      graph-bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *neo4j_routing_uri

  api:
    depends_on: !reset
      neo4j-core1:
        condition: service_healthy
      neo4j-core2:
        condition: service_healthy
      neo4j-core3:
        condition: service_healthy
      graph-bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *neo4j_routing_uri

  mcp:
    depends_on: !reset
      neo4j-core1:
        condition: service_healthy
      neo4j-core2:
        condition: service_healthy
      neo4j-core3:
        condition: service_healthy
      graph-bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *neo4j_routing_uri

volumes:
  neo4j_core1_data:
  neo4j_core2_data:
  neo4j_core3_data:

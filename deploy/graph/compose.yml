# Graph layer: Neo4j, bootstrap, ingest_worker, HTTP API
services:
  neo4j:
    image: neo4j:5
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_apoc_export_file_enabled: "true"
    volumes:
      - neo4j_data:/data
      - ../../var/veil/graph:/var/lib/neo4j/import/user_export
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  graph-bootstrap:
    build:
      context: ../..
      dockerfile: deploy/graph/docker/graph-bootstrap.Dockerfile
    volumes:
      - ../../var/veil/graph/releases:/pack/releases:ro
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: neo4jpassword
      NEO4J_DB: neo4j
      GRAPH_PACK_SKIP: ${GRAPH_PACK_SKIP:-0}
      GRAPH_PACK_DEFAULT: ${GRAPH_PACK_DEFAULT:-1}
      GRAPH_PACK_DEFAULT_VERSION: ${GRAPH_PACK_DEFAULT_VERSION:-${GRAPH_PACK_VERSION:-v0.4.1}}
      GRAPH_PACK_DEFAULT_URL: ${GRAPH_PACK_DEFAULT_URL:-}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

  ingest_worker:
    build:
      context: ../..
      dockerfile: deploy/graph/docker/ingest_worker.Dockerfile
    restart: unless-stopped
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: neo4jpassword
      NEO4J_DB: neo4j
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_INGEST_STREAM: INGEST
      NATS_DURABLE: ingest_worker
      NATS_SUBSCRIBE_SUBJECT: ${NATS_SUBSCRIBE_SUBJECT:-ingest.>}
      INGEST_BATCH: ${INGEST_BATCH:-10}
      INGEST_MAX_WAIT: ${INGEST_MAX_WAIT:-5s}
    depends_on:
      neo4j:
        condition: service_healthy
      graph-bootstrap:
        condition: service_completed_successfully

  api:
    build:
      context: ../..
      dockerfile: deploy/graph/docker/api.Dockerfile
    ports:
      - "${API_PORT:-8090}:8090"
    environment:
      API_LISTEN_ADDR: ":8090"
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: neo4jpassword
      NEO4J_DB: neo4j
    depends_on:
      neo4j:
        condition: service_healthy
      graph-bootstrap:
        condition: service_completed_successfully

volumes:
  neo4j_data:

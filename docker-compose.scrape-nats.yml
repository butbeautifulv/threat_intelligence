# Optional override: scrape producers publish only to NATS (no Bolt env on scrapers).
# Use with INGEST_MODE=nats. ingest-worker still uses Neo4j.
#
#   INGEST_MODE=nats docker compose -f docker-compose.yml -f docker-compose.scrape-nats.yml --profile scrape up --build -d
#
# Only clears NEO4J_* on producers; base compose keeps depends_on (Neo4j + NATS healthy).
services:
  vuln:
    environment:
      NEO4J_URI: null
      NEO4J_USER: null
      NEO4J_PASS: null
      NEO4J_DB: null

  sbom:
    environment:
      NEO4J_URI: null
      NEO4J_USER: null
      NEO4J_PASS: null
      NEO4J_DB: null

  lola:

services:
  neo4j:
    image: neo4j:5
    container_name: threat-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=512M
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_apoc_export_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/neo4j_user_export:/var/lib/neo4j/import/user_export
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  graph-bootstrap:
    build:
      context: .
      dockerfile: docker/graph-bootstrap.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - GRAPH_PACK_SKIP=${GRAPH_PACK_SKIP:-0}
      - GRAPH_PACK_DEFAULT=${GRAPH_PACK_DEFAULT:-1}
      - GRAPH_PACK_URL=${GRAPH_PACK_URL:-}
      - GRAPH_PACK_DEFAULT_URL=${GRAPH_PACK_DEFAULT_URL:-}
      - GRAPH_PACK_FILE=${GRAPH_PACK_FILE:-}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "${API_PORT:-8090}:8090"
    environment:
      - API_LISTEN_ADDR=:8090
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
    depends_on:
      neo4j:
        condition: service_healthy
      graph-bootstrap:
        condition: service_completed_successfully
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8090/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Stdio MCP: `docker compose --profile mcp run --rm -i mcp` (stack must be up so Neo4j + bootstrap finished).
  mcp:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    stdin_open: true
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
    depends_on:
      neo4j:
        condition: service_healthy
      graph-bootstrap:
        condition: service_completed_successfully

  # NATS JetStream for optional scrape → queue → ingest-worker → Neo4j pipeline.
  nats:
    profiles: ["scrape"]
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"

  # Pull consumer: drains ingest.> (AppSec + TI + future domains) and writes to Neo4j.
  ingest-worker:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/ingest-worker.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - NATS_URL=nats://nats:4222
      - NATS_INGEST_STREAM=INGEST
      - NATS_DURABLE=ingest-worker
      - NATS_SUBSCRIBE_SUBJECT=${NATS_SUBSCRIBE_SUBJECT:-ingest.>}
      - INGEST_BATCH=${INGEST_BATCH:-10}
      - INGEST_MAX_WAIT=${INGEST_MAX_WAIT:-5s}
    depends_on:
      neo4j:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure

  # --- profile "scrape": proxy pool + live ingest (not started by default `docker compose up`) ---
  proxybroker:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/proxybroker.Dockerfile
    environment:
      - PROXYBROKER_ADDR=:8099
    ports:
      - "${PROXYBROKER_PORT:-8099}:8099"
    restart: on-failure

  vuln:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/vuln.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - NVD_MAX_PAGES=${NVD_MAX_PAGES:-1}
      - VULN_CACHE_DIR=/data/cache
      - VULN_REQUEST_DELAY=${VULN_REQUEST_DELAY:-1200ms}
      - VULN_METASPLOIT_MAX_RB=${VULN_METASPLOIT_MAX_RB:-200}
      - VULN_METASPLOIT_MAX_DIRS=${VULN_METASPLOIT_MAX_DIRS:-500}
      - VULN_EXPLOITDB_MAX_ROWS=${VULN_EXPLOITDB_MAX_ROWS:-4000}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./data/cache:/data/cache

  sbom:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/sbom.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SBOM_MAX_CVES=${SBOM_MAX_CVES:-200}
      - SBOM_MAX_GHSA=${SBOM_MAX_GHSA:-100}
      - SBOM_GHSA_MIN_YEAR=${SBOM_GHSA_MIN_YEAR:-2017}
      - INGEST_MODE=${INGEST_MODE:-direct}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - SBOM_NATS_SUBJECT=${SBOM_NATS_SUBJECT:-ingest.appsec.sbom}
      - SBOM_CVE_LIST_FILE=${SBOM_CVE_LIST_FILE:-/fixtures/cve_list_seed.txt}
      - SBOM_CVE_LIST_URL=${SBOM_CVE_LIST_URL:-}
    depends_on:
      neo4j:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure
    volumes:
      - ./data/cache:/data/cache

  lola:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/lola.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - LOLA_CACHE_DIR=/data/cache
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - LOLA_PROXY_URLS=${LOLA_PROXY_URLS:-}
      - LOFTS_SKIP_ON_ERROR=${LOFTS_SKIP_ON_ERROR:-true}
      - LOLA_MITRE_MAX_TECHNIQUES=${LOLA_MITRE_MAX_TECHNIQUES:-2500}
      - LOLA_MITRE_MAX_RELATIONSHIPS=${LOLA_MITRE_MAX_RELATIONSHIPS:-50000}
    volumes:
      - ./data/cache:/data/cache
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

  ds:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/ds.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - DS_CACHE_DIR=/data/cache
      - DS_MAX_SIGMA=${DS_MAX_SIGMA:-120}
      - DS_MAX_YARA=${DS_MAX_YARA:-80}
      - DS_MAX_ATOMIC=${DS_MAX_ATOMIC:-120}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DS_PROXY_URLS=${DS_PROXY_URLS:-}
      - DS_MAX_CALDERA=${DS_MAX_CALDERA:-120}
    volumes:
      - ./data/cache:/data/cache
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

  ti:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/ti.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - INGEST_MODE=${INGEST_MODE:-direct}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - TI_NATS_SUBJECT=${TI_NATS_SUBJECT:-ingest.ti.events}
      - TI_KEV_MAX=${TI_KEV_MAX:-200}
      - TI_PT_MAX=${TI_PT_MAX:-40}
      - TI_URLHAUS_MAX=${TI_URLHAUS_MAX:-300}
      - TI_THREATFOX_MAX=${TI_THREATFOX_MAX:-4000}
      - TI_THREATFOX_DAYS=${TI_THREATFOX_DAYS:-3}
      - TI_MALWAREBAZAAR_MAX=${TI_MALWAREBAZAAR_MAX:-500}
      - TI_FEODO_MAX=${TI_FEODO_MAX:-5000}
      - TI_OPENPHISH_MAX=${TI_OPENPHISH_MAX:-800}
      - TI_CACHE_DIR=/data/cache
      - TI_REQUEST_DELAY=${TI_REQUEST_DELAY:-1200ms}
      - TI_PROXY_URLS=${TI_PROXY_URLS:-}
      - TI_PROXY_MODE=${TI_PROXY_MODE:-}
      - MALWAREBAZAAR_AUTH_KEY=${MALWAREBAZAAR_AUTH_KEY:-}
      - MALWARE_BAZAAR_API_KEY=${MALWARE_BAZAAR_API_KEY:-}
      - THREATFOX_AUTH_KEY=${THREATFOX_AUTH_KEY:-}
      - OPENPHISH_FEED_URL=${OPENPHISH_FEED_URL:-}
      - FEODO_BLOCKLIST_URL=${FEODO_BLOCKLIST_URL:-}
      - PT_RSS_URL=${PT_RSS_URL:-}
    command: ["--feeds", "${TI_FEEDS:-kev,urlhaus,threatfox,malwarebazaar,feodo}", "--input", "/app/example.jsonl"]
    depends_on:
      neo4j:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure
    volumes:
      - ./data/cache:/data/cache

  coderules:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/coderules.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CODERULES_SOURCES=${CODERULES_SOURCES:-cwe,semgrep,codeql}
      - CODERULES_MAX_CWE=${CODERULES_MAX_CWE:-5000}
      - CODERULES_MAX_SEMGREP=${CODERULES_MAX_SEMGREP:-80}
      - CODERULES_MAX_CODEQL=${CODERULES_MAX_CODEQL:-60}
      - INGEST_MODE=${INGEST_MODE:-direct}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - CODERULES_NATS_SUBJECT=${CODERULES_NATS_SUBJECT:-ingest.appsec.coderules}
    depends_on:
      neo4j:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure
    volumes:
      - ./data/cache:/data/cache

  nuclei:
    profiles: ["scrape"]
    build:
      context: .
      dockerfile: docker/nuclei.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - NUCLEI_MAX=${NUCLEI_MAX:-120}
      - NUCLEI_YEARS=${NUCLEI_YEARS:-2023,2024}
      - INGEST_MODE=${INGEST_MODE:-direct}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NUCLEI_NATS_SUBJECT=${NUCLEI_NATS_SUBJECT:-ingest.appsec.nuclei}
    depends_on:
      neo4j:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure
    volumes:
      - ./data/cache:/data/cache

volumes:
  neo4j_data:
  neo4j_logs:

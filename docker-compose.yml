services:
  neo4j:
    image: neo4j:5
    container_name: threat-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=512M
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_apoc_export_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/neo4j_export:/var/lib/neo4j/import/user_export
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  vuln:
    build:
      context: .
      dockerfile: docker/vuln.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - NVD_MAX_PAGES=${NVD_MAX_PAGES:-1}
      - VULN_CACHE_DIR=/data/cache
      - VULN_REQUEST_DELAY=${VULN_REQUEST_DELAY:-1200ms}
      - VULN_METASPLOIT_MAX_RB=${VULN_METASPLOIT_MAX_RB:-200}
      - VULN_METASPLOIT_MAX_DIRS=${VULN_METASPLOIT_MAX_DIRS:-500}
      - VULN_EXPLOITDB_MAX_ROWS=${VULN_EXPLOITDB_MAX_ROWS:-4000}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./data/cache:/data/cache

  lola:
    build:
      context: .
      dockerfile: docker/lola.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - LOLA_CACHE_DIR=/data/cache
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - LOLA_PROXY_URLS=${LOLA_PROXY_URLS:-}
      - LOFTS_SKIP_ON_ERROR=${LOFTS_SKIP_ON_ERROR:-true}
      - LOLA_MITRE_MAX_TECHNIQUES=${LOLA_MITRE_MAX_TECHNIQUES:-2500}
      - LOLA_MITRE_MAX_RELATIONSHIPS=${LOLA_MITRE_MAX_RELATIONSHIPS:-50000}
    volumes:
      - ./data/cache:/data/cache
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

  ds:
    build:
      context: .
      dockerfile: docker/ds.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - DS_CACHE_DIR=/data/cache
      - DS_MAX_SIGMA=${DS_MAX_SIGMA:-120}
      - DS_MAX_YARA=${DS_MAX_YARA:-80}
      - DS_MAX_ATOMIC=${DS_MAX_ATOMIC:-120}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DS_PROXY_URLS=${DS_PROXY_URLS:-}
      - DS_MAX_CALDERA=${DS_MAX_CALDERA:-120}
    volumes:
      - ./data/cache:/data/cache
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

  ti:
    build:
      context: .
      dockerfile: docker/ti.Dockerfile
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - TI_KEV_MAX=${TI_KEV_MAX:-200}
      - TI_PT_MAX=${TI_PT_MAX:-40}
      - TI_URLHAUS_MAX=${TI_URLHAUS_MAX:-300}
      - TI_CACHE_DIR=/data/cache
      - TI_REQUEST_DELAY=${TI_REQUEST_DELAY:-1200ms}
    command: ["--feeds", "${TI_FEEDS:-kev,pt,urlhaus}", "--input", "/app/example.jsonl"]
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./data/cache:/data/cache

  panel:
    build:
      context: .
      dockerfile: docker/panel.Dockerfile
    ports:
      - "${PANEL_PORT:-8088}:8088"
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=neo4jpassword
      - NEO4J_DB=neo4j
      - PORT=8088
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

volumes:
  neo4j_data:
  neo4j_logs:

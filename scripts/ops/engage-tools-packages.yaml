# Machine-readable package hints for Engage client-native host tools.
# Consumed by scripts/ops/install-engage-host-tools.sh (requires PyYAML: python3-yaml / pip pyyaml).
# Upstream naming varies; verify on your distro before relying on automation.
schema_version: 1

profiles:
  minimal:
    - nmap
    - httpx
    - nuclei
  recommended:
    - nmap
    - masscan
    - httpx
    - nuclei
    - subfinder
    - amass
    - gobuster
    - feroxbuster
    - ffuf
    - sqlmap
    - nikto
  full:
    - nmap
    - masscan
    - httpx
    - nuclei
    - subfinder
    - amass
    - gobuster
    - feroxbuster
    - ffuf
    - sqlmap
    - nikto
    - hydra
    - trivy

tools:
  nmap:
    apt: [nmap]
    dnf: [nmap]
    pacman: [nmap]
    zypper: [nmap]
    apk: [nmap]
  masscan:
    apt: [masscan]
    dnf: [masscan]
    pacman: [masscan]
    zypper: [masscan]
    apk: [] # use edge/community or build; leave empty = manual
  httpx:
